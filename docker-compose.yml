name: operagent

# Phase 0 — 장애 재현 환경. LLM·에이전트·자동대응(write) 없음.
# 관측 → 고장 주입 → 탐지 → 알림 전달까지의 루프만 완성한다.

services:
  # ── 감시 대상 (직접 작성) ──────────────────────────────
  demo-service:
    build: ./demo-service
    container_name: demo-service
    ports:
      - "8080:8080"
    restart: unless-stopped

  # ── 임시 alert 수신 로거 (Phase 1에서 Python 에이전트로 교체) ──
  webhook-sink:
    build: ./webhook-sink
    container_name: webhook-sink
    ports:
      - "9000:9000"
    restart: unless-stopped

  # ── 베이스라인 트래픽 (없으면 에러율 rule이 0/0 = NaN) ──
  load-gen:
    image: curlimages/curl:8.11.0
    container_name: load-gen
    depends_on:
      - demo-service
    volumes:
      - ./load-gen/loadgen.sh:/loadgen.sh:ro
    entrypoint: ["sh", "/loadgen.sh"]
    restart: unless-stopped

  # ── 탐지·알림 (기성품) ─────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    depends_on:
      - demo-service
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    depends_on:
      - webhook-sink
    restart: unless-stopped

  loki:
    image: grafana/loki:3.2.1
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    command:
      - -config.file=/etc/loki/loki-config.yml
    restart: unless-stopped

  # 로그 수집기 = Grafana Alloy (promtail은 2026-03-02 EOL — 사용 금지)
  alloy:
    image: grafana/alloy:v1.5.1
    container_name: alloy
    ports:
      - "12345:12345"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_DEFAULT_THEME=dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  loki-data:
