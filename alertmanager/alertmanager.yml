# 모든 alert을 webhook-sink로 라우팅. 데모용으로 group 주기를 짧게.
route:
  receiver: webhook-sink
  group_by: ["alertname"]
  group_wait: 5s
  group_interval: 10s
  repeat_interval: 1h

receivers:
  - name: webhook-sink
    webhook_configs:
      # Phase 1에서 이 URL이 Python 에이전트로 교체된다.
      - url: http://webhook-sink:9000/alert
        send_resolved: true
