# 모든 alert을 webhook-sink로 라우팅. 데모용으로 group 주기를 짧게.
route:
  receiver: webhook-sink
  group_by: ["alertname"]
  group_wait: 5s
  group_interval: 10s
  repeat_interval: 1h

receivers:
  - name: webhook-sink
    webhook_configs:
      # Phase 1: Python 진단 에이전트(operagent)로 라우팅.
      - url: http://operagent:9000/webhook
        send_resolved: true
