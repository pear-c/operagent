# 데모용 빠른 주기 — 운영값 아님(운영은 15~30s).
global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: demo-service
    static_configs:
      - targets: ["demo-service:8080"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
