# alert 3종 — 고장 3종(/chaos/errors·latency·memory)과 1:1 매핑.
# 임계값·표현식은 operagent 정책(policy-keywords "메트릭·alert 계약"). 변경 시 동기 갱신.
groups:
  - name: demo-service-alerts
    rules:
      # /chaos/errors 와 대응
      - alert: HighErrorRate
        expr: sum(rate(http_requests_total{status=~"5.."}[1m])) / sum(rate(http_requests_total[1m])) > 0.1
        for: 30s
        labels:
          severity: critical
          service: demo-service
        annotations:
          summary: "demo-service 5xx 에러율 10% 초과"
          description: "최근 1분 5xx 비율이 {{ $value | humanizePercentage }} 입니다. /chaos/errors 주입 장애일 수 있습니다."

      # /chaos/latency 와 대응
      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket[1m]))) > 0.5
        for: 30s
        labels:
          severity: warning
          service: demo-service
        annotations:
          summary: "demo-service p95 지연 0.5s 초과"
          description: "최근 1분 p95 지연이 {{ $value }}s 입니다. /chaos/latency 주입 장애일 수 있습니다."

      # /chaos/memory 와 대응 (기본 주입 200MB가 확실히 넘기는 150MB 선)
      - alert: HighHeapMemory
        expr: go_memstats_heap_inuse_bytes{job="demo-service"} > 157286400
        for: 30s
        labels:
          severity: warning
          service: demo-service
        annotations:
          summary: "demo-service 힙 메모리 150MB 초과"
          description: "heap_inuse가 {{ $value | humanize1024 }}B 입니다. /chaos/memory 주입 장애일 수 있습니다."
